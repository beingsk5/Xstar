name: Xstar Sports Live Stream

on:
 # schedule:
 #   - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      sports:
        description: 'Sports to stream'
        default: 'cricket'
        required: false
      force:
        description: 'Force stream (skip match check)'
        type: boolean
        default: false

concurrency:
  group: xstar-live-stream
  cancel-in-progress: false

jobs:

  check:
    name: Match Check
    runs-on: ubuntu-latest
    outputs:
      go:    ${{ steps.detect.outputs.go }}
      sport: ${{ steps.detect.outputs.sport }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install requests --quiet

      - name: Detect matches
        id: detect
        working-directory: backend
        run: |
          FORCE="${{ github.event.inputs.force }}"
          SPORTS="${{ github.event.inputs.sports || 'cricket' }}"

          if [ "$FORCE" = "true" ]; then
            echo "go=true"       >> $GITHUB_OUTPUT
            echo "sport=$SPORTS" >> $GITHUB_OUTPUT
            echo "Forced — skipping match check"
          else
            python scheduler.py > /tmp/sched.json 2>/tmp/sched_err.txt || true
            python parse_schedule.py
          fi

  stream:
    name: Live Stream
    needs: check
    if: needs.check.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg chromium-browser xvfb \
            fonts-noto-color-emoji fonts-liberation \
            python3-pip curl
          echo "ffmpeg: $(ffmpeg -version 2>&1 | head -1)"
          echo "chromium: $(chromium-browser --version)"

      - name: Install Python packages
        run: pip install requests --quiet

      - name: Download fonts
        run: bash frontend/fonts/download-fonts.sh || echo "Font download failed - using fallbacks"

      - name: Write placeholder data files
        run: python backend/write_placeholder.py

      - name: Start data fetcher
        run: |
          SPORT="${{ needs.check.outputs.sport }}"
          cd backend
          nohup python fetcher.py --sports "$SPORT" > /tmp/fetcher.log 2>&1 &
          echo "Fetcher PID=$! — waiting 12s for first data..."
          sleep 12

      - name: Verify data is flowing
        run: python backend/verify_data.py

      - name: Start streams
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          XSTAR_MAIN_KEY:     ${{ secrets.YOUTUBE_MAIN_KEY }}
          XSTAR_SHORTS_KEY:   ${{ secrets.YOUTUBE_SHORTS_KEY }}
          DISCORD_WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          cd scripts
          python stream.py --main-fps 24 --shorts-fps 20

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xstar-logs-${{ github.run_id }}
          path: |
            /tmp/fetcher.log
            health.json
          retention-days: 7
