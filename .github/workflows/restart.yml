name: Xstar Sports Watchdog

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:

  watchdog:
    name: Check and Restart if Needed
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install requests --quiet

      - name: Run scheduler to detect active matches
        working-directory: backend
        run: python scheduler.py > /tmp/sched.json 2>/dev/null || true

      - name: Check stream status and match activity
        id: watchdog_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        working-directory: backend
        run: python watchdog_check.py

      - name: Trigger stream restart
        if: steps.watchdog_check.outputs.need_restart == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          SPORT="${{ steps.watchdog_check.outputs.sport }}"
          echo "Stream down but match live - restarting for sport=$SPORT"
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/actions/workflows/stream.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"sports\":\"$SPORT\",\"force\":\"false\"}}"
          echo "Restart triggered"

      - name: Discord alert on restart
        if: steps.watchdog_check.outputs.need_restart == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d '{"content":"Xstar Sports Watchdog: Stream was down but match is live. Auto-restart triggered."}'
          fi

      - name: Summary
        run: |
          echo "Watchdog complete: $(date -u)"
          echo "Need restart: ${{ steps.watchdog_check.outputs.need_restart }}"
